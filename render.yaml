services:
  - type: web
    name: sistema-mantenimiento-pollo
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: db-mantenimiento
          property: connectionString
      - key: PYTHON_VERSION
        value: core.settings
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: db-mantenimiento
    plan: free